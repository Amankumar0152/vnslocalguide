<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Varanasi Local Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#FFFAF4;color:#2C1A0E;min-height:100vh;overflow-x:hidden}

/* LANG BAR */
.lang-bar{background:#2C1A0E;color:rgba(255,250,244,0.7);text-align:center;font-size:0.72rem;letter-spacing:0.15em;padding:0.55rem 1rem}
.lang-bar span{color:#F0A854}

/* LANG SWITCHER */
.lang-switcher{
  display:flex;align-items:center;gap:0.4rem;
}
.lang-btn{
  background:transparent;
  border:1px solid rgba(44,26,14,0.18);
  color:rgba(44,26,14,0.55);
  font-family:'Jost',sans-serif;
  font-size:0.72rem;font-weight:500;
  letter-spacing:0.08em;
  padding:0.35rem 0.8rem;
  border-radius:100px;
  cursor:pointer;
  transition:all 0.2s;
}
.lang-btn.active{background:#D4622A;border-color:#D4622A;color:#fff}
.lang-btn:hover:not(.active){background:rgba(212,98,42,0.08);border-color:rgba(212,98,42,0.3);color:#D4622A}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;border-bottom:1px solid rgba(44,26,14,0.08);background:#FFFAF4;position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:#2C1A0E;letter-spacing:0.02em}
.logo span{color:#D4622A}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-book{display:inline-flex;align-items:center;gap:0.5rem;background:#D4622A;color:#fff;font-size:0.78rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:0.6rem 1.4rem;border-radius:100px;text-decoration:none;transition:background 0.22s,transform 0.22s}
.nav-book:hover{background:#B54E1E;transform:translateY(-1px)}

/* HERO */
.hero{max-width:820px;margin:0 auto;padding:5rem 2rem 4rem;text-align:center}
.pill{display:inline-block;background:rgba(212,98,42,0.1);color:#D4622A;font-size:0.68rem;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;padding:0.38rem 1rem;border-radius:100px;margin-bottom:1.8rem;border:1px solid rgba(212,98,42,0.22);animation:fadeup 0.8s ease both}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.6rem,6vw,4.2rem);font-weight:700;line-height:1.15;color:#2C1A0E;animation:fadeup 0.8s 0.1s ease both;margin-bottom:0.5rem}
h1 em{font-style:italic;color:#D4622A}
.hero-text{font-size:clamp(0.95rem,1.6vw,1.05rem);font-weight:300;color:rgba(44,26,14,0.7);line-height:1.9;max-width:560px;margin:0 auto 2.5rem;animation:fadeup 0.8s 0.25s ease both}
.hero-cta{display:inline-flex;align-items:center;gap:0.6rem;background:#D4622A;color:#fff;font-family:'Jost',sans-serif;font-size:0.92rem;font-weight:500;padding:0.9rem 2.2rem;border-radius:100px;text-decoration:none;transition:background 0.22s,transform 0.22s,box-shadow 0.22s;animation:fadeup 0.8s 0.35s ease both;box-shadow:0 4px 20px rgba(212,98,42,0.25)}
.hero-cta:hover{background:#B54E1E;transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,98,42,0.35)}
.hero-cta .arr{transition:transform 0.25s}
.hero-cta:hover .arr{transform:translateX(4px)}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:1rem;max-width:600px;margin:3.5rem auto;padding:0 2rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(44,26,14,0.1)}
.divider-om{font-size:1.1rem;color:#D4622A;opacity:0.6}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.2rem;max-width:1000px;margin:0 auto 4rem;padding:0 2rem}
.card{background:#fff;border:1px solid rgba(44,26,14,0.08);border-radius:16px;padding:1.8rem 1.5rem;transition:transform 0.3s,box-shadow 0.3s,border-color 0.3s;cursor:default}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(44,26,14,0.1);border-color:rgba(212,98,42,0.25)}
.card-icon{font-size:1.6rem;margin-bottom:0.9rem;display:block}
.card h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:500;color:#2C1A0E;margin-bottom:0.4rem}
.card p{font-size:0.82rem;color:rgba(44,26,14,0.55);line-height:1.7}

/* BOOK SECTION */
.book-section{background:linear-gradient(135deg,#2C1A0E 0%,#4A2A10 100%);padding:4rem 2rem;text-align:center}
.book-section h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;color:#FFFAF4;margin-bottom:0.5rem}
.book-section .sub{font-size:0.95rem;color:rgba(255,250,244,0.6);margin-bottom:2rem;font-weight:300}
.book-btn{display:inline-flex;align-items:center;gap:0.6rem;background:#F0A854;color:#2C1A0E;font-family:'Jost',sans-serif;font-size:0.9rem;font-weight:600;padding:0.85rem 2.2rem;border-radius:100px;text-decoration:none;transition:background 0.22s,transform 0.22s}
.book-btn:hover{background:#F5BF7A;transform:translateY(-2px)}

/* FOOTER */
footer{background:#FFFAF4;border-top:1px solid rgba(44,26,14,0.08);padding:1.8rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.8rem}
.footer-logo{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:#2C1A0E}
.footer-logo span{color:#D4622A}
.footer-links{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.footer-links a{font-size:0.78rem;color:rgba(44,26,14,0.5);text-decoration:none;transition:color 0.2s}
.footer-links a:hover{color:#D4622A}
.footer-copy{font-size:0.72rem;color:rgba(44,26,14,0.3);width:100%;text-align:center;margin-top:0.5rem}

@keyframes fadeup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-d1{transition-delay:0.08s}.reveal-d2{transition-delay:0.16s}.reveal-d3{transition-delay:0.24s}.reveal-d4{transition-delay:0.32s}

@media(max-width:600px){nav{padding:1rem 1.2rem}.hero{padding:3rem 1.2rem 2.5rem}footer{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<!-- Lang bar -->
<div class="lang-bar">
  🇮🇳 &nbsp;<span data-t="langbar"></span>
</div>

<!-- Nav -->
<nav>
  <div class="logo">Varanasi <span>Local</span> Guide</div>
  <div class="nav-right">
    <!-- Language Switcher -->
    <div class="lang-switcher">
      <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <a href="https://www.varanasitouristguide.com/" target="_blank" class="nav-book" data-t="navbook"></a>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="pill" data-t="pill"></div>
  <h1 data-t="h1"></h1>
  <p class="hero-text" data-t="herotext"></p>
  <a href="https://www.varanasitouristguide.com/" target="_blank" class="hero-cta">
    <span data-t="herocta"></span> <span class="arr">→</span>
  </a>
</div>

<div class="divider"><span class="divider-om">ॐ</span></div>

<!-- Cards -->
<div class="cards">
  <div class="card reveal reveal-d1">
    <span class="card-icon">🛕</span>
    <h3 data-t="c1title"></h3>
    <p data-t="c1text"></p>
  </div>
  <div class="card reveal reveal-d2">
    <span class="card-icon">🚣</span>
    <h3 data-t="c2title"></h3>
    <p data-t="c2text"></p>
  </div>
  <div class="card reveal reveal-d3">
    <span class="card-icon">🍛</span>
    <h3 data-t="c3title"></h3>
    <p data-t="c3text"></p>
  </div>
  <div class="card reveal reveal-d4">
    <span class="card-icon">🎶</span>
    <h3 data-t="c4title"></h3>
    <p data-t="c4text"></p>
  </div>
</div>

<!-- Book Section -->
<div class="book-section">
  <h2 data-t="booktitle"></h2>
  <p class="sub" data-t="booksub"></p>
  <a href="https://www.varanasitouristguide.com/" target="_blank" class="book-btn">
    varanasitouristguide.com ↗
  </a>
</div>

<!-- Footer -->
<footer>
  <div class="footer-logo">Varanasi <span>Local</span> Guide</div>
  <div class="footer-links">
    <a href="https://www.varanasitouristguide.com/" target="_blank" data-t="navbook"></a>
    <a href="https://wa.me/919565194075" target="_blank">WhatsApp</a>
    <a href="mailto:hello@varanasilocalguide.com" data-t="email"></a>
  </div>
  <div class="footer-copy" data-t="copy"></div>
</footer>

<script>
// ============================================================
// TRANSLATIONS
// ============================================================
const T = {
  ru: {
    langbar:  "Варанаси · Кashi · Святой город Индии",
    pill:     "✦ Каши · काशी · Варанаси",
    h1:       "Город, который<br><em>никогда не спит</em>",
    herotext: "Варанаси — это не просто место назначения, это ощущение. Один из старейших живых городов мира, где Ганг течёт вечно и каждый гхат хранит тысячи историй.",
    herocta:  "Исследовать и забронировать туры",
    navbook:  "Забронировать тур ↗",
    c1title:  "Священные Храмы",
    c1text:   "Каши Вишванатх, Санкат Мочан и сотни скрытых святынь — духовное сердце Индии.",
    c2title:  "Гхаты и Ганг",
    c2text:   "84 гхата вдоль священного Ганга. Лодочные прогулки на рассвете, вечерняя Ааратти — моменты, которые остаются навсегда.",
    c3title:  "Еда Варанаси",
    c3text:   "Качори сабзи, тхандай, паан — подлинные уличные вкусы древнего города.",
    c4title:  "Культура и Музыка",
    c4text:   "Столица классической музыки Индии. Шёлк, табла и традиции старше времён.",
    booktitle:"Готовы посетить Варанаси?",
    booksub:  "Забронируйте экскурсии с местными гидами — гхаты, храмы, еда и многое другое.",
    email:    "Написать нам",
    copy:     "© 2025 Varanasi Local Guide · Сделано с любовью в Каши 🪔",
  },
  en: {
    langbar:  "Varanasi · Kashi · The Holy City of India",
    pill:     "✦ Kashi · काशी · Varanasi",
    h1:       "The City That<br><em>Never Sleeps</em>",
    herotext: "Varanasi is not just a destination — it is a feeling. One of the world's oldest living cities, where the Ganges flows eternal and every ghat tells a thousand stories.",
    herocta:  "Explore & Book Tours",
    navbook:  "Book a Tour ↗",
    c1title:  "Sacred Temples",
    c1text:   "Kashi Vishwanath, Sankat Mochan, and hundreds of hidden shrines — the divine heart of India.",
    c2title:  "Ghat Experiences",
    c2text:   "84 ghats along the holy Ganges. Sunrise boat rides, evening Aarti — moments that stay forever.",
    c3title:  "Banarasi Food",
    c3text:   "Kachori sabzi, thandai, paan — the authentic street flavours of the ancient city.",
    c4title:  "Culture & Music",
    c4text:   "India's classical music capital. Silk weaving, tabla, and traditions older than time itself.",
    booktitle:"Ready to Visit Varanasi?",
    booksub:  "Book guided tours with local experts — ghats, temples, food & more.",
    email:    "Email Us",
    copy:     "© 2025 Varanasi Local Guide · Made with love in Kashi 🪔",
  }
};

// ============================================================
// APPLY LANGUAGE
// ============================================================
function setLang(lang) {
  const t = T[lang];
  document.documentElement.lang = lang;
  localStorage.setItem('vlg-lang', lang);

  // Update all [data-t] elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // Update active button
  document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  // Update page title
  document.title = lang === 'ru'
    ? 'Варанаси — Местный Гид | Varanasi Local Guide'
    : 'Varanasi Local Guide — Kashi, India';
}

// ============================================================
// DETECT LANGUAGE ON LOAD
// ============================================================
(function() {
  // 1. Check if user previously chose a language manually
  const saved = localStorage.getItem('vlg-lang');
  if (saved === 'en' || saved === 'ru') {
    setLang(saved);
    return;
  }

  // 2. Detect browser language
  const browserLang = (navigator.language || navigator.userLanguage || 'ru').toLowerCase();

  // If browser is set to English → show English
  if (browserLang.startsWith('en')) {
    setLang('en');
  } else {
    // All other languages (Russian, Hindi, etc.) → default Russian
    setLang('ru');
  }
})();

// ============================================================
// SCROLL REVEAL
// ============================================================
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
</script>
</body>
</html>
